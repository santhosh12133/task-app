<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Manager</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --border: #d9e1ec;
        --accent: #1d4ed8;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 35%, #eef2f7 100%);
        color: var(--text);
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      form {
        display: grid;
        grid-template-columns: 2fr 1fr auto;
        gap: 12px;
        margin-bottom: 20px;
      }

      input,
      button,
      select {
        font: inherit;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 14px;
      }

      button {
        background: var(--accent);
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 700;
      }

      button.secondary {
        background: #e9eef7;
        color: var(--text);
      }

      button.danger {
        background: var(--danger);
      }

      #message {
        margin: 0 0 14px;
        min-height: 1.2em;
        color: var(--muted);
      }

      .task-list {
        display: grid;
        gap: 12px;
      }

      .task {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .task strong {
        display: block;
        margin-bottom: 4px;
      }

      .meta {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      @media (max-width: 700px) {
        form,
        .task {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Task Manager</h1>
        <p>Create, update, and delete tasks using the backend API.</p>

        <form id="taskForm">
          <input id="title" name="title" type="text" placeholder="Task title" required />
          <select id="status" name="status">
            <option value="todo">todo</option>
            <option value="in progress">in progress</option>
            <option value="done">done</option>
          </select>
          <button type="submit">Add Task</button>
        </form>

        <div id="message"></div>
        <div id="taskList" class="task-list"></div>
        <!-- Edit modal -->
        <div id="editModal" class="modal" aria-hidden="true">
          <div class="modal-backdrop"></div>
          <div class="modal-panel" role="dialog" aria-modal="true">
            <h3 style="margin-top:0">Edit Task</h3>
            <input id="modalTitle" type="text" placeholder="Task title" style="width:100%; padding:8px; margin-bottom:8px; border-radius:8px; border:1px solid #d9e1ec" />
            <select id="modalStatus" style="width:100%; padding:8px; margin-bottom:12px; border-radius:8px; border:1px solid #d9e1ec">
              <option value="todo">todo</option>
              <option value="in progress">in progress</option>
              <option value="done">done</option>
            </select>
            <div style="display:flex; gap:8px; justify-content:flex-end">
              <button id="modalCancel" class="secondary">Cancel</button>
              <button id="modalSave">Save</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>

<style>
  /* Modal styles */
  .modal { display:none; position:fixed; inset:0; z-index:60; }
  .modal[aria-hidden="false"] { display:block; }
  .modal-backdrop { position:absolute; inset:0; background:rgba(9,30,66,0.6); backdrop-filter: blur(2px); }
  .modal-panel { position:relative; width:100%; max-width:480px; margin:80px auto; background:var(--panel); padding:18px; border-radius:12px; box-shadow:0 10px 30px rgba(2,6,23,0.2); border:1px solid var(--border); }

  /* Status badges */
  .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:0.85rem; font-weight:600; color:white; margin-left:8px; }
  .badge-todo { background:#6b7280; } /* gray */
  .badge-in-progress { background:#f59e0b; } /* amber */
  .badge-done { background:#10b981; } /* green */
</style>
